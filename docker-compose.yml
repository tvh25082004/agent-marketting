version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./output:/app/output
      - ./temp:/app/temp
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./tinasoft.db
      - CRAWL_BASE_URL=https://laomusic.net
      - CRAWL_INTERVAL_MINUTES=2
    env_file:
      - ./backend/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_TELEMETRY_DISABLED=1

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
